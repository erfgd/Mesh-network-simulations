[General]
network = mesh_sim
#parallel-simulation = true

sim-time-limit = 100s

warmup-period = 20s 


##################################################
# TOPOLOGY
##################################################

*.numRelays  = 16
*.numServers = 1


##################################################
# AREA 
##################################################

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 2500m
**.constraintAreaMaxY = 2500m
**.constraintAreaMaxZ = 25m


##################################################
# RADIO / PHY 
##################################################

# propagation & path loss
**.propagationType = "ConstantTimePropagation" #"ConstantTimePropagation", "ConstantSpeedPropagation"
**.pathLossType = "FreeSpacePathLoss"
**.analogModelType = "ScalarAnalogModel" #"DimensionalAnalogModel", "ScalarAnalogModel"

**.arpType = "GlobalARP"

**.wlan[*].mgmtType = "Ieee80211MgmtAdhoc"
**.carrierFrequency = 2.4GHz

**.routingProtocol = "Batman"
**.clients[*].forwarding = false 
**.hasStatus = true

**.wlan[*].opMode = "n(mixed-2.4Ghz)"
**.wlan[*].radio.antenna.numAntennas = 4
# 1. Полоса Wi-Fi

**.**.wlan[*].radio.transmitter.power =  12mW

**.wlan[*].radio.bandName = "2.4 GHz"

#**.wlan[*].bitrate = ${btr = 12Mbps, 6Mbps, 24Mbps}

*.**.wlan[*].radio.transmitter.modulation = ${modulation = "BPSK", "QAM-16","QAM-64", "QAM-256", "QPSK"}
*.**.wlan[*].radio.receiver.modulation   = ${modulation}

*.**.wlan[*].radio.bandwidth = ${bandwidth = 20MHz, 40MHz}

**.wlan[*].mac.rtsThresholdBytes = 900B 
**.wlan[*].mac.maxQueueSize = 100000

**.wlan[*].mac.sifsTime = 16us
**.wlan[*].mac.slotTime = 9us
**.wlan[*].mac.cwMinData = 3
**.wlan[*].mac.cwMaxData = 7
**.wlan[*].mac.TXOP3 = 47us


##################################################
# MOBILITY
##################################################

**.mobility.initFromDisplayString = false

# Server (static)
**.server[*].mobilityType = "StationaryMobility"
**.server[*].mobility.initialX = 2200m
**.server[*].mobility.initialY = 1000m
**.server[*].mobility.initialZ = 15m

# Relays (grid)
**.Router[*].mobilityType = "StaticGridMobility"
**.Router[*].mobility.marginX = 250m
**.Router[*].mobility.marginY = 250m
**.Router[*].mobility.numHosts = 16

# Clients static near relays
**.clients[*].mobilityType = "StationaryMobility"
**.clients[*].mobility.initialZ = 2m


##################################################
#  UDP APPS
##################################################

**.server[*].numUdpApps = 1
**.server[*].udpApp[*].typename = "UDPSink"
**.server[*].udpApp[*].localPort = 21
**.server[*].udpApp[*].startTime = 0s

**.clients[*].numUdpApps = 1
**.clients[*].udpApp[*].typename = "UDPBasicApp"
**.clients[*].udpApp[*].localPort = 22
**.clients[*].udpApp[*].destAddresses = "server[0]"
**.clients[*].udpApp[*].destPort = 21
**.clients[*].udpApp[*].stopTime = 90.5s
**.clients[*].udpApp[*].messageLength = 1000B  
**.clients[*].udpApp[*].startTime = uniform(5s, 5.5s)



##################################################
# VISUALIZATOR
##################################################

*.visualizer.*.physicalLinkVisualizer.displayLinks = true
#*.visualizer.*.physicalLinkVisualizer.packetFilter = "UDPData*"
#*.visualizer.*.networkRouteVisualizer.displayRoutes = true

*.visualizer.*.transportRouteVisualizer.displayRoutes = true
**.wlan[*].radio.displayCommunicationRange = true
**.wlan[*].radio.minSNIR.result-recording-modes = vector


[Config scenario1_batman]
*.scenarioManager.script = xmldoc("scenario.xml")
*.numClients = 1

**.clients[*].mobilityType = "StationaryMobility"
**.clients[*].mobility.initialX = 400m
**.clients[*].mobility.initialY = 400m
**.clients[*].mobility.initialZ = 2m

**.clients[0].udpApp[0].sendInterval = exponential(0.008s)       # 1 Мбит/с


