# --------------------------------------------------------------
# --------------------------------------------------------------
# Группа 1 (приоритет 1): клиенты 1–4 (индексы 0–3)
# Скорости: 1, 2, 3, 4 Мбит/с соответственно
**.clients[0..3].udpApp[0].startTime = uniform(5s, 5.5s)

**.clients[0].udpApp[0].sendInterval = exponential(0.008s)       # 1 Мбит/с
**.clients[1].udpApp[0].sendInterval = exponential(0.004s)      # 2 Мбит/с
**.clients[2].udpApp[0].sendInterval = exponential(0.0026667s)   # 3 Мбит/с
**.clients[3].udpApp[0].sendInterval = exponential(0.002s)       # 4 Мбит/с

# --------------------------------------------------------------
# Группа 2 (приоритет 2): клиенты 5–8 (индексы 4–7)
# Скорости: 1, 2, 3, 2 Мбит/с (пример)
**.clients[4..7].udpApp[0].startTime = uniform(26s, 26.5s)

**.clients[4].udpApp[0].sendInterval = exponential(0.008s)      # 1 Мбит/с
**.clients[5].udpApp[0].sendInterval = exponential(0.004s)      # 2 Мбит/с
**.clients[6].udpApp[0].sendInterval = exponential(0.0026667s)   # 3 Мбит/с
**.clients[7].udpApp[0].sendInterval = exponential(0.004s)       # 2 Мбит/с

# --------------------------------------------------------------
# Группа 3 (приоритет 3): клиенты 9–16 (индексы 8–15)
# Все по 2 Мбит/с (const)
**.clients[8..15].udpApp[0].startTime = uniform(45s, 45.5s)
**.clients[8..15].udpApp[0].sendInterval = exponential(0.004s)   # 2 Мбит/

